const GAS_CODE=`function doGet(e) {
  var action = (e && e.parameter && e.parameter.action) || "data";
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  if (action === "login") {
    var uid = (e.parameter.uid || "").trim();
    var pwd = (e.parameter.pwd || "").trim();
    var accSheet = ss.getSheetByName("계정");
    if (!accSheet) return jsonOut({ success: false, error: "계정 시트가 없습니다." });
    var accData = accSheet.getDataRange().getValues();
    for (var i = 1; i < accData.length; i++) {
      if (String(accData[i][0]).trim() === uid && String(accData[i][1]).trim() === pwd) {
        return jsonOut({ success: true, user: { uid: uid, name: String(accData[i][2]), role: String(accData[i][3]) } });
      }
    }
    return jsonOut({ success: false, error: "아이디 또는 비밀번호가 일치하지 않습니다." });
  }
  var sheet = ss.getSheets()[0];
  var data = sheet.getDataRange().getValues();
  var headers = data[0];
  var result = [];
  for (var i = 1; i < data.length; i++) {
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j]] = data[i][j] !== undefined ? data[i][j].toString() : "";
    }
    result.push(row);
  }
  return jsonOut({ success: true, data: result, count: result.length, timestamp: new Date().toISOString() });
}
function jsonOut(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}`;

function mdToHtml(md){if(!md)return"";let h=md.replace(/^(\|.+\|)\n(\|[-:\s|]+\|)\n((?:\|.+\|\n?)*)/gm,(_,hd,sp,bd)=>{const hC=hd.split("|").filter(c=>c.trim()),bR=bd.trim().split("\n").filter(r=>r.trim());let t='<div class="tw"><table><thead><tr>';hC.forEach(c=>t+=`<th>${c.trim()}</th>`);t+="</tr></thead><tbody>";bR.forEach(r=>{const cs=r.split("|").filter(c=>c.trim());t+="<tr>";cs.forEach(c=>t+=`<td>${c.trim()}</td>`);t+="</tr>";});return t+"</tbody></table></div>";}).replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/__(.+?)__/g,'<u>$1</u>').replace(/_(.+?)_/g,'<em>$1</em>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>');h=h.replace(/(?:^|<br\/>)- (.+?)(?=<br\/>|- |<\/p>|$)/g,'<li>$1</li>');h=h.replace(/(<li>.*?<\/li>)+/gs,'<ul>$&</ul>');return`<p>${h}</p>`;}
function parseTSV(raw){const ls=raw.trim().split("\n").filter(l=>l.trim());if(ls.length<2)return[];const sep=ls[0].includes("\t")?"\t":",";const hd=ls[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,""));return ls.slice(1).map(l=>{const cs=l.split(sep).map(c=>c.trim().replace(/^"|"$/g,""));const o={};hd.forEach((h,i)=>{o[h]=cs[i]||""});return o}).filter(o=>Object.values(o).some(v=>v));}

function processRow(row,id){
  let name="",date="",dept="";
  Object.keys(row).forEach(k=>{const kl=k.toLowerCase();if(kl.includes("이름")||kl==="name")name=String(row[k]);else if(kl.includes("날짜")||kl.includes("timestamp")||kl.includes("타임"))date=String(row[k]);else if(kl.includes("소속")||kl.includes("부서"))dept=String(row[k]);});
  let text=`[참여자 정보]\n이름: ${name}\n날짜: ${date}\n소속: ${dept}\n\n[설문 응답]\n`;
  Object.keys(row).forEach(k=>{if(SKIP.some(s=>k.toLowerCase().includes(s)))return;if(row[k])text+=`${k}: ${row[k]}\n`;});
  let A=0,B=0,C2=0;Object.values(row).forEach(v=>{const s=String(v).trim();if(s.startsWith("A"))A++;else if(s.startsWith("B"))B++;else if(s.startsWith("C"))C2++;});
  const dims={EI:{A:0,B:0},SN:{A:0,B:0},TF:{A:0,B:0},JP:{A:0,B:0}};
  P2_KEYS.forEach((pk,i)=>{const m=Object.keys(row).find(k=>k.includes(pk));if(m&&P2_DIMS[i]){const v=String(row[m]).trim();if(v.startsWith("A"))dims[P2_DIMS[i]].A++;else if(v.startsWith("B"))dims[P2_DIMS[i]].B++;}});
  const mbti=(dims.EI.A>=dims.EI.B?"E":"I")+(dims.SN.A>=dims.SN.B?"S":"N")+(dims.TF.A>=dims.TF.B?"T":"F")+(dims.JP.A>=dims.JP.B?"J":"P");
  text+=`\n[자동 산출]\nMBTI: ${mbti}\n행동유형: A${A} B${B} C${C2}\n`;
  return{id,name,date,dept,text,mbti,A,B,C:C2,raw:row};
}

const TopBar=({left,right})=>React.createElement('div',{className:"np",style:{background:X.card,borderBottom:`1px solid ${X.bdr}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}},left,right);

// ═══ 메인 앱 (이전 JSX 아티팩트와 동일 로직) ═══
function App(){
  const[loggedIn,setLoggedIn]=useState(false);
  const[user,setUser]=useState(null);
  const[loginId,setLoginId]=useState("");
  const[loginPw,setLoginPw]=useState("");
  const[loginError,setLoginError]=useState("");
  const[loginLoading,setLoginLoading]=useState(false);
  const[gasUrl,setGasUrl]=useState("");
  const[gasInput,setGasInput]=useState("https://script.google.com/macros/s/AKfycbzxlms-9cIrrQhS_9SK-Q4LW5m-s7uNSaTFT6bruuzMF686sM51pSg08BrylJMIm4Ls/exec");
  const[page,setPage]=useState("list");
  const[rawData,setRawData]=useState("");
  const[participants,setParticipants]=useState(()=>BUILT_IN.map((r,i)=>processRow(r,i)));
  const[selected,setSelected]=useState(null);
  const[report,setReport]=useState("");
  const[reports,setReports]=useState({});
  const[loading,setLoading]=useState(false);
  const[fetching,setFetching]=useState(false);
  const[error,setError]=useState("");
  const[search,setSearch]=useState("");
  const[autoRefresh,setAutoRefresh]=useState(false);
  const[lastFetch,setLastFetch]=useState(null);
  const[newIds,setNewIds]=useState(new Set());
  const[showSettings,setShowSettings]=useState(false);
  const[dataSource,setDataSource]=useState("builtin");

  async function handleLogin(){
    if(!loginId.trim()||!loginPw.trim()){setLoginError("아이디와 비밀번호를 입력해 주세요.");return;}
    if(gasInput.trim()){
      setLoginLoading(true);setLoginError("");
      try{const url=`${gasInput.trim()}?action=login&uid=${encodeURIComponent(loginId)}&pwd=${encodeURIComponent(loginPw)}`;
        const r=await fetch(url);const j=await r.json();
        if(j.success){setUser(j.user);setLoggedIn(true);setGasUrl(gasInput.trim());fetchGAS(gasInput.trim());}
        else setLoginError(j.error||"로그인 실패");
      }catch(e){setLoginError("서버 연결 오류: "+e.message);}finally{setLoginLoading(false);}
    }else{
      if(loginId==="admin"&&loginPw==="naeillo2026"){setUser({uid:"admin",name:"관리자",role:"admin"});setLoggedIn(true);}
      else setLoginError("GAS URL 미설정. 기본 계정(admin)으로 로그인하거나 GAS URL을 입력하세요.");
    }
  }
  function handleLogout(){setLoggedIn(false);setUser(null);setLoginId("");setLoginPw("");setLoginError("");setPage("list");setShowSettings(false);}

  const fetchGAS=useCallback(async(url,silent=false)=>{
    if(!url)return;if(!silent)setFetching(true);setError("");
    try{const r=await fetch(url+"?action=data");const j=await r.json();
      if(j.success&&j.data){const parsed=j.data.map((row,i)=>processRow(row,i));
        if(participants.length>0&&parsed.length>participants.length){const ns=new Set();for(let i=participants.length;i<parsed.length;i++)ns.add(i);setNewIds(ns);setTimeout(()=>setNewIds(new Set()),8000);}
        setParticipants(parsed);setLastFetch(new Date());setDataSource("gas");if(!silent)setShowSettings(false);
      }else setError("데이터를 가져오지 못했습니다.");
    }catch(e){setError("GAS 연결 오류: "+e.message);}finally{setFetching(false);}
  },[participants.length]);

  useEffect(()=>{if(!autoRefresh||!gasUrl||dataSource!=="gas")return;const iv=setInterval(()=>fetchGAS(gasUrl,true),60000);return()=>clearInterval(iv);},[autoRefresh,gasUrl,dataSource,fetchGAS]);

  function handlePaste(){if(!rawData.trim()){setError("데이터를 붙여넣어 주세요.");return;}const rows=parseTSV(rawData);if(!rows.length){setError("파싱 실패");return;}setParticipants(rows.map((r,i)=>processRow(r,i)));setReports({});setDataSource("paste");setShowSettings(false);setError("");}

  async function runAnalysis(p){
    if(reports[p.id]){setReport(reports[p.id]);setSelected(p);setPage("report");return;}
    setLoading(true);setError("");setSelected(p);
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json",
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:SYS,messages:[{role:"user",content:`다음 참여자의 설문 응답 데이터를 분석하여 "오늘은 프로그램" 리포트를 작성해 주십시오.\n\n${p.text}`}]})});
      const d=await r.json();const txt=d.content?.map(b=>b.text||"").join("\n")||"분석 실패";
      setReports(prev=>({...prev,[p.id]:txt}));setReport(txt);setPage("report");
    }catch(e){setError("API 오류: "+e.message);}finally{setLoading(false);}
  }

  const filtered=participants.filter(p=>!search||(p.name||"").includes(search)||(p.dept||"").includes(search));
  const srcLabel={builtin:"내장 데이터",gas:"Google Forms 연동",paste:"수동 붙여넣기"}[dataSource];

  // ═══ 로그인 화면 ═══
  if(!loggedIn){
    return(<div style={{minHeight:"100vh",background:`linear-gradient(135deg,${X.bg} 0%,#141E2E 50%,#0D1520 100%)`,fontFamily:"'Noto Sans KR',sans-serif",color:X.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:420,padding:"0 20px"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:72,height:72,background:`linear-gradient(135deg,${X.accent},${X.warm})`,borderRadius:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:16}}>🔐</div>
          <h1 style={{fontSize:28,fontWeight:700}}>프로젝트 <span style={{color:X.warm}}>내일로</span></h1>
          <p style={{fontSize:14,color:X.dim,marginTop:4}}>오늘은 프로그램 · AI 분석 시스템</p>
          <div style={{fontSize:11,color:X.dim,marginTop:2}}>충북청주지역자활센터</div>
        </div>
        <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:28}}>
          <h2 style={{fontSize:17,fontWeight:600,marginBottom:20,textAlign:"center"}}>로그인</h2>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:X.dim,display:"block",marginBottom:5}}>아이디</label>
            <input value={loginId} onChange={e=>{setLoginId(e.target.value);setLoginError("");}} placeholder="아이디" onKeyDown={e=>{if(e.key==="Enter")handleLogin();}}
              style={{width:"100%",padding:"12px 14px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,color:X.text,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:X.dim,display:"block",marginBottom:5}}>비밀번호</label>
            <input type="password" value={loginPw} onChange={e=>{setLoginPw(e.target.value);setLoginError("");}} placeholder="비밀번호" onKeyDown={e=>{if(e.key==="Enter")handleLogin();}}
              style={{width:"100%",padding:"12px 14px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,color:X.text,fontSize:14,outline:"none"}}/>
          </div>
          <details style={{marginBottom:16}}>
            <summary style={{cursor:"pointer",fontSize:12,color:X.dim}}>📡 GAS 서버 URL 설정 (선택)</summary>
            <div style={{marginTop:8}}>
              <input value={gasInput} onChange={e=>setGasInput(e.target.value)} placeholder="https://script.google.com/macros/s/AKfycbzxlms-9cIrrQhS_9SK-Q4LW5m-s7uNSaTFT6bruuzMF686sM51pSg08BrylJMIm4Ls/exec"
                style={{width:"100%",padding:"10px 12px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:8,color:X.text,fontSize:12,outline:"none"}}/>
              <p style={{fontSize:11,color:X.dim,marginTop:6,lineHeight:1.6}}>GAS URL 입력 시 스프레드시트 "계정" 시트로 인증.<br/>미입력 시 기본 계정(admin)으로 로그인.</p>
            </div>
          </details>
          {loginError&&<div style={{color:X.err,fontSize:13,marginBottom:12,padding:"8px 12px",background:X.err+"15",borderRadius:8}}>{loginError}</div>}
          <button onClick={handleLogin} disabled={loginLoading}
            style={{width:"100%",padding:14,background:`linear-gradient(135deg,${X.accent},${X.warm})`,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",opacity:loginLoading?.7:1}}>
            {loginLoading?"인증 중...":"로그인"}</button>
        </div>
        <details style={{marginTop:20}}>
          <summary style={{cursor:"pointer",fontSize:13,color:X.dim,textAlign:"center"}}>처음 사용하시나요? 설정 안내</summary>
          <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:12,padding:18,marginTop:10,fontSize:12,color:X.dim,lineHeight:1.9}}>
            <div style={{color:X.warm,fontWeight:600,marginBottom:8}}>스프레드시트 설정</div>
            ① Forms 응답 스프레드시트 열기<br/>② <span style={{color:X.accent}}>"계정"</span> 시트 만들기<br/>③ 아이디|비밀번호|이름|권한 형식 입력<br/>④ Apps Script → 코드 붙여넣기 → 웹앱 배포
            <details style={{marginTop:10}}><summary style={{cursor:"pointer",color:X.accent}}>📎 Apps Script 코드</summary>
              <pre style={{background:"#0D1117",border:`1px solid ${X.bdr}`,borderRadius:8,padding:12,fontSize:10,lineHeight:1.5,color:"#7EE787",overflow:"auto",maxHeight:200,marginTop:6,whiteSpace:"pre-wrap"}}>{GAS_CODE}</pre>
            </details>
          </div>
        </details>
      </div>
    </div>);
  }

  // ═══ 참여자 목록 ═══
  if(page==="list"){const ac=Object.keys(reports).length;
    return(<div style={{minHeight:"100vh",background:X.bg,fontFamily:"'Noto Sans KR',sans-serif",color:X.text}}>
      <div style={{background:X.card,borderBottom:`1px solid ${X.bdr}`,padding:"14px 20px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div><h1 style={{fontSize:20,fontWeight:700}}>프로젝트 <span style={{color:X.warm}}>내일로</span> <span style={{fontSize:13,color:X.dim,fontWeight:400}}>· 오늘은 프로그램</span></h1>
            <div style={{fontSize:11,color:X.dim,marginTop:2}}>{user?.name}({user?.uid}) · {srcLabel}{lastFetch&&<span> · {lastFetch.toLocaleTimeString("ko-KR")}</span>}</div></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {dataSource==="gas"&&gasUrl&&<><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:4,background:autoRefresh?X.ok:X.dim,animation:autoRefresh?"pu 2s infinite":"none"}}/></div>
              <Btn onClick={()=>setAutoRefresh(!autoRefresh)} color={autoRefresh?X.ok:X.dim} bg="transparent">{autoRefresh?"⏸":"▶"}</Btn>
              <Btn onClick={()=>fetchGAS(gasUrl,true)}>{fetching?"...":"🔄"}</Btn></>}
            <Btn onClick={()=>setShowSettings(!showSettings)} color={X.warm} bg={X.wS}>⚙</Btn>
            <Btn onClick={handleLogout} color={X.err} bg="transparent">로그아웃</Btn></div></div></div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 20px 80px"}}>
        {showSettings&&<div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:14,padding:24,marginBottom:20}}>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>데이터 소스</h3>
          {gasUrl&&<div style={{background:X.ok+"15",border:`1px solid ${X.ok}44`,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:X.ok}}>✓ GAS 연동 활성</div>}
          {!gasUrl&&<div style={{background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:X.accent,marginBottom:8}}>📡 GAS 연동</div>
            <input value={gasInput} onChange={e=>setGasInput(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"
              style={{width:"100%",padding:"10px 12px",background:X.card,border:`1px solid ${X.bdr}`,borderRadius:8,color:X.text,fontSize:12,outline:"none"}}/>
            <button onClick={()=>{if(gasInput.trim()){setGasUrl(gasInput.trim());fetchGAS(gasInput.trim());}}} style={{marginTop:8,padding:"8px 16px",background:X.accent,border:"none",borderRadius:8,color:"#fff",fontSize:12,cursor:"pointer"}}>연동</button></div>}
          <div style={{background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,padding:16}}>
            <div style={{fontSize:13,fontWeight:600,color:X.warm,marginBottom:8}}>📋 수동 붙여넣기</div>
            <textarea value={rawData} onChange={e=>setRawData(e.target.value)} placeholder="스프레드시트 데이터"
              style={{width:"100%",minHeight:100,padding:10,background:X.card,border:`1px solid ${X.bdr}`,borderRadius:8,color:X.text,fontSize:11,resize:"vertical",outline:"none",fontFamily:"monospace"}}/>
            <button onClick={handlePaste} style={{marginTop:8,padding:"8px 16px",background:X.warm,border:"none",borderRadius:8,color:"#000",fontSize:12,cursor:"pointer"}}>불러오기</button></div>
          {error&&<div style={{color:X.err,fontSize:13,marginTop:10}}>{error}</div>}</div>}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 또는 소속 검색..."
          style={{width:"100%",padding:"12px 16px",background:X.card,border:`1px solid ${X.bdr}`,borderRadius:10,color:X.text,fontSize:14,outline:"none",marginBottom:16}}/>
        <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
          {[{l:"전체",v:participants.length,u:"명",c:X.accent},{l:"분석완료",v:ac,u:"명",c:X.ok},{l:"행동형↗",v:participants.length?Math.round(participants.reduce((s,p)=>s+p.A,0)/participants.length):0,c:X.accent},{l:"관계형↗",v:participants.length?Math.round(participants.reduce((s,p)=>s+p.B,0)/participants.length):0,c:X.warm}].map(it=>
            <div key={it.l} style={{flex:"1 1 140px",background:X.card,border:`1px solid ${X.bdr}`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
              <div style={{fontSize:11,color:X.dim}}>{it.l}</div><div style={{fontSize:22,fontWeight:700,color:it.c,marginTop:2}}>{it.v}{it.u&&<span style={{fontSize:11,color:X.dim}}> {it.u}</span>}</div></div>)}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(p=>{const done=!!reports[p.id],isNew=newIds.has(p.id);
            return <div key={p.id} style={{background:isNew?X.wS:X.card,border:`1px solid ${isNew?X.warm:done?X.ok+"44":X.bdr}`,borderRadius:12,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,transition:"all .3s",animation:isNew?"fi .5s ease":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flex:"1 1 200px"}}>
                <div style={{position:"relative"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:done?X.ok+"22":X.aS,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:done?X.ok:X.accent,fontWeight:700}}>{done?"✓":p.name?.charAt(0)||"?"}</div>
                  {isNew&&<div style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:7,background:X.warm,border:`2px solid ${X.bg}`,fontSize:7,color:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>N</div>}</div>
                <div><div style={{fontSize:15,fontWeight:600}}>{p.name||`참여자 ${p.id+1}`}{isNew&&<span style={{marginLeft:8,fontSize:11,color:X.warm}}>NEW</span>}</div>
                  <div style={{fontSize:12,color:X.dim,marginTop:1}}>{p.dept&&<span>{p.dept} · </span>}MBTI {p.mbti} · A:{p.A} B:{p.B} C:{p.C}</div></div></div>
              <div style={{display:"flex",gap:6}}>
                <Btn onClick={()=>{setSelected(p);setPage("raw");}} color={X.dim} bg="transparent">응답</Btn>
                <Btn onClick={()=>runAnalysis(p)} color={done?X.ok:X.accent} bg={done?X.ok+"18":X.aS}>{done?"리포트":"AI 분석"}</Btn></div></div>;})}
        </div>
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:X.dim}}>검색 결과 없음</div>}</div>
      {loading&&<Spin msg={`${selected?.name||"참여자"} 님 분석 중...`}/>}</div>);

  if(page==="raw"&&selected){const keys=Object.keys(selected.raw);

      <TopBar left={<button onClick={()=>setPage("list")} style={{background:"none",border:"none",color:X.dim,cursor:"pointer",fontSize:14}}>← 목록</button>}
              right={<Btn onClick={()=>runAnalysis(selected)} color={X.warm} bg={X.wS}>AI 분석</Btn>}/>
      <div style={{maxWidth:800,margin:"0 auto",padding:"28px 20px"}}>

          <h2 style={{fontSize:22,fontWeight:600}}>{selected.name||`참여자 ${selected.id+1}`} 님 응답</h2>
          <p style={{fontSize:13,color:X.dim,marginTop:4}}>{selected.dept&&`${selected.dept} · `}MBTI {selected.mbti} · A:{selected.A} B:{selected.B} C:{selected.C}</p></div>
        <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:12,padding:20,marginBottom:20}}>

          {[{l:"행동형(A)",v:selected.A,c:X.accent},{l:"관계형(B)",v:selected.B,c:X.warm},{l:"사고형(C)",v:selected.C,c:X.ok}].map(it=>

        <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:12,overflow:"hidden"}}>
          {keys.map((k,i)=><div key={i} style={{display:"flex",borderBottom:i<keys.length-1?`1px solid ${X.bdr}`:"none"}}>
            <div style={{flex:"0 0 42%",padding:"11px 14px",fontSize:13,fontWeight:500,background:i%2?`rgba(26,35,50,.3)`:"transparent",borderRight:`1px solid ${X.bdr}`,wordBreak:"break-word"}}>{k}</div>
            <div style={{flex:1,padding:"11px 14px",fontSize:13,color:X.dim,background:i%2?`rgba(26,35,50,.3)`:"transparent",wordBreak:"break-word"}}>{String(selected.raw[k])||"—"}</div></div>)}</div></div>
      {loading&&<Spin msg={`${selected.name} 분석 중...`}/>}</div>);

  // ═══ 리포트 ═══
  if(page==="report"&&selected){
    return(<div style={{minHeight:"100vh",background:X.bg,fontFamily:"'Noto Sans KR',sans-serif",color:X.text}}>
      <style>{`.rc h1{font-size:24px;font-weight:700;margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid ${X.accent};color:${X.warm}}.rc h2{font-size:20px;font-weight:600;margin:28px 0 12px;color:${X.accent}}.rc h3{font-size:17px;font-weight:600;margin:22px 0 10px}.rc h4{font-size:15px;font-weight:600;margin:18px 0 8px;color:${X.dim}}.rc p{line-height:1.85;margin-bottom:12px;font-size:14px}.rc blockquote{border-left:3px solid ${X.warm};padding:12px 16px;margin:16px 0;background:${X.wS};border-radius:0 8px 8px 0;font-style:italic}.rc ul{padding-left:20px;margin:8px 0}.rc li{line-height:1.85;font-size:14px;margin-bottom:4px}.rc u{text-decoration:underline;text-underline-offset:3px;color:${X.warm}}.tw{overflow-x:auto;margin:16px 0}.rc table{width:100%;border-collapse:collapse;font-size:13px}.rc th{background:${X.aS};color:${X.accent};padding:10px 14px;text-align:left;font-weight:600;border:1px solid ${X.bdr}}.rc td{padding:10px 14px;border:1px solid ${X.bdr};line-height:1.6}.rc tr:nth-child(even) td{background:rgba(26,35,50,.5)}`}</style>
      <TopBar left={<button onClick={()=>setPage("list")} style={{background:"none",border:"none",color:X.dim,cursor:"pointer",fontSize:14}}>← 목록</button>}
              right={<div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>{setSelected(selected);setPage("raw");}} color={X.dim} bg="transparent">응답</Btn>
                <Btn onClick={()=>window.print()}>인쇄</Btn>
                {selected.id>0&&<Btn onClick={()=>runAnalysis(participants[selected.id-1])} color={X.dim} bg="transparent">◀</Btn>}
                {selected.id<participants.length-1&&<Btn onClick={()=>runAnalysis(participants[selected.id+1])} color={X.dim} bg="transparent">▶</Btn>}</div>}/>
      <div style={{maxWidth:820,margin:"0 auto",padding:"28px 24px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-block",padding:"4px 14px",background:X.wS,borderRadius:16,fontSize:12,color:X.warm,marginBottom:10}}>프로젝트 내일로 · 오늘은 프로그램</div>
          <h1 style={{fontSize:26,fontWeight:700,margin:"8px 0"}}>{selected.name||`참여자 ${selected.id+1}`} 님의 AI 분석 리포트</h1>
          <p style={{color:X.dim,fontSize:13}}>{selected.dept&&`${selected.dept} · `}{selected.date||new Date().toLocaleDateString("ko-KR")}</p></div>
        <div style={{display:"flex",gap:12,marginBottom:26,flexWrap:"wrap"}}>
          <div style={{flex:"1 1 140px",background:X.card,border:`1px solid ${X.bdr}`,borderRadius:12,padding:16,textAlign:"center"}}>
            <div style={{fontSize:11,color:X.dim,marginBottom:4}}>MBTI</div><div style={{fontSize:26,fontWeight:700,color:X.accent,letterSpacing:2}}>{selected.mbti}</div></div>
          {[{l:"행동형(A)",v:selected.A,c:X.accent},{l:"관계형(B)",v:selected.B,c:X.warm},{l:"사고형(C)",v:selected.C,c:X.ok}].map(it=>
            <div key={it.l} style={{flex:"1 1 100px",background:X.card,border:`1px solid ${X.bdr}`,borderRadius:12,padding:16,textAlign:"center"}}>
              <div style={{fontSize:11,color:X.dim,marginBottom:4}}>{it.l}</div><div style={{fontSize:24,fontWeight:700,color:it.c}}>{it.v}</div></div>)}</div>
        <div className="rc" style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:"32px 28px",lineHeight:1.85}} dangerouslySetInnerHTML={{__html:mdToHtml(report)}}/></div>
      {loading&&<Spin msg="분석 중..."/>}</div>);
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
