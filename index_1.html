function mdToHtml(md){if(!md)return"";let h=md.replace(/^(\|.+\|)\n(\|[-:\s|]+\|)\n((?:\|.+\|\n?)*)/gm,(_,hd,sp,bd)=>{const hC=hd.split("|").filter(c=>c.trim()),bR=bd.trim().split("\n").filter(r=>r.trim());let t='<div class="tw"><table><thead><tr>';hC.forEach(c=>t+=`<th>${c.trim()}</th>`);t+="</tr></thead><tbody>";bR.forEach(r=>{const cs=r.split("|").filter(c=>c.trim());t+="<tr>";cs.forEach(c=>t+=`<td>${c.trim()}</td>`);t+="</tr>";});return t+"</tbody></table></div>";}).replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/__(.+?)__/g,'<u>$1</u>').replace(/_(.+?)_/g,'<em>$1</em>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>');h=h.replace(/(?:^|<br\/>)- (.+?)(?=<br\/>|- |<\/p>|$)/g,'<li>$1</li>');h=h.replace(/(<li>.*?<\/li>)+/gs,'<ul>$&</ul>');return`<p>${h}</p>`;}
function parseTSV(raw){const ls=raw.trim().split("\n").filter(l=>l.trim());if(ls.length<2)return[];const sep=ls[0].includes("\t")?"\t":",";const hd=ls[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,""));return ls.slice(1).map(l=>{const cs=l.split(sep).map(c=>c.trim().replace(/^"|"$/g,""));const o={};hd.forEach((h,i)=>{o[h]=cs[i]||""});return o}).filter(o=>Object.values(o).some(v=>v));}
function processRow(row,id){let name="",date="",dept="";Object.keys(row).forEach(k=>{const kl=k.toLowerCase();if(kl.includes("이름")||kl==="name")name=String(row[k]);else if(kl.includes("날짜")||kl.includes("timestamp")||kl.includes("타임"))date=String(row[k]);else if(kl.includes("소속")||kl.includes("부서"))dept=String(row[k]);});let text=`[참여자 정보]\n이름: ${name}\n날짜: ${date}\n소속: ${dept}\n\n[설문 응답]\n`;Object.keys(row).forEach(k=>{if(SKIP.some(s=>k.toLowerCase().includes(s)))return;if(row[k])text+=`${k}: ${row[k]}\n`;});let A=0,B=0,C2=0;Object.values(row).forEach(v=>{const s=String(v).trim();if(s.startsWith("A"))A++;else if(s.startsWith("B"))B++;else if(s.startsWith("C"))C2++;});const dims={EI:{A:0,B:0},SN:{A:0,B:0},TF:{A:0,B:0},JP:{A:0,B:0}};P2_KEYS.forEach((pk,i)=>{const m=Object.keys(row).find(k=>k.includes(pk));if(m&&P2_DIMS[i]){const v=String(row[m]).trim();if(v.startsWith("A"))dims[P2_DIMS[i]].A++;else if(v.startsWith("B"))dims[P2_DIMS[i]].B++;}});const mbti=(dims.EI.A>=dims.EI.B?"E":"I")+(dims.SN.A>=dims.SN.B?"S":"N")+(dims.TF.A>=dims.TF.B?"T":"F")+(dims.JP.A>=dims.JP.B?"J":"P");text+=`\n[자동 산출]\nMBTI: ${mbti}\n행동유형: A${A} B${B} C${C2}\n`;return{id,name,date,dept,text,mbti,A,B,C:C2,raw:row};}

// ══ 색상 ══
const X={bg:"#0F1419",card:"#1A2332",accent:"#3B82F6",aS:"#1E3A5F",warm:"#F59E0B",wS:"#3D2F0A",text:"#E2E8F0",dim:"#8899AA",bdr:"#2A3A4E",ok:"#10B981",err:"#EF4444"};

const Btn=({children,onClick,color=X.accent,bg=X.aS,s={}})=>React.createElement("button",{onClick,style:{padding:"7px 16px",background:bg,border:`1px solid ${color}`,borderRadius:8,color,cursor:"pointer",fontSize:12,fontWeight:500,...s}},children);

  const [gasUrl,setGasUrl]=useState(CONFIG.GAS_URL);
  const [gasInput,setGasInput]=useState("https://script.google.com/macros/s/AKfycbzxlms-9cIrrQhS_9SK-Q4LW5m-s7uNSaTFT6bruuzMF686sM51pSg08BrylJMIm4Ls/exec");
  const [page,setPage]=useState("list");
  const [participants,setParticipants]=useState(()=>BUILT_IN.map((r,i)=>processRow(r,i)));
  const [selected,setSelected]=useState(null);
  const [report,setReport]=useState("");
  const [reports,setReports]=useState({});
  const [loading,setLoading]=useState(false);
  const [fetching,setFetching]=useState(false);
  const [error,setError]=useState("");
  const [search,setSearch]=useState("");
  const [autoRefresh,setAutoRefresh]=useState(false);
  const [lastFetch,setLastFetch]=useState(null);

  const [rawData,setRawData]=useState("");

  async function handleLogin(){
    if(!loginId.trim()||!loginPw.trim()){setLoginError("아이디와 비밀번호를 입력해 주세요.");return;}
    if(gasInput.trim()){
      setLoginLoading(true);setLoginError("");
      try{const url=`${gasInput.trim()}?action=login&uid=${encodeURIComponent(loginId)}&pwd=${encodeURIComponent(loginPw)}`;const r=await fetch(url);const j=await r.json();if(j.success){setUser(j.user);setLoggedIn(true);setGasUrl(gasInput.trim());fetchGAS(gasInput.trim());}else setLoginError(j.error||"로그인 실패");}catch(e){setLoginError("서버 연결 오류: "+e.message);}finally{setLoginLoading(false);}
    }else{
      if(loginId===CONFIG.DEFAULT_ADMIN_ID&&loginPw===CONFIG.DEFAULT_ADMIN_PW){setUser({uid:"admin",name:"관리자",role:"admin"});setLoggedIn(true);}
      else setLoginError("GAS URL 미설정. 기본 계정(admin)으로 로그인하거나 GAS URL을 입력하세요.");
    }
  }
  function handleLogout(){setLoggedIn(false);setUser(null);setLoginId("");setLoginPw("");setLoginError("");setPage("list");setShowSettings(false);}

  const fetchGAS=useCallback(async(url,silent=false)=>{
    if(!url)return;if(!silent)setFetching(true);setError("");
    try{const r=await fetch(url+"?action=data");const j=await r.json();if(j.success&&j.data){const parsed=j.data.map((row,i)=>processRow(row,i));if(participants.length>0&&parsed.length>participants.length){const ns=new Set();for(let i=participants.length;i<parsed.length;i++)ns.add(i);setNewIds(ns);setTimeout(()=>setNewIds(new Set()),8000);}setParticipants(parsed);setLastFetch(new Date());setDataSource("gas");if(!silent)setShowSettings(false);}else setError("데이터 가져오기 실패");}catch(e){setError("GAS 오류: "+e.message);}finally{setFetching(false);}
  },[participants.length]);

  useEffect(()=>{if(!autoRefresh||!gasUrl||dataSource!=="gas")return;const iv=setInterval(()=>fetchGAS(gasUrl,true),60000);return()=>clearInterval(iv);},[autoRefresh,gasUrl,dataSource,fetchGAS]);

  function handlePaste(){if(!rawData.trim()){setError("데이터를 입력하세요.");return;}const rows=parseTSV(rawData);if(!rows.length){setError("파싱 실패");return;}setParticipants(rows.map((r,i)=>processRow(r,i)));setReports({});setDataSource("paste");setShowSettings(false);setError("");}

  async function runAnalysis(p){
    if(reports[p.id]){setReport(reports[p.id]);setSelected(p);setPage("report");return;}
    setLoading(true);setError("");setSelected(p);
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:SYS,messages:[{role:"user",content:`다음 참여자의 설문 응답 데이터를 분석하여 "오늘은 프로그램" 리포트를 작성해 주십시오.\n\n${p.text}`}]})});const d=await r.json();const txt=d.content?.map(b=>b.text||"").join("\n")||"분석 실패";setReports(prev=>({...prev,[p.id]:txt}));setReport(txt);setPage("report");}catch(e){setError("API 오류: "+e.message);}finally{setLoading(false);}
  }

  const filtered=participants.filter(p=>!search||(p.name||"").includes(search)||(p.dept||"").includes(search));
  const srcLabel={builtin:"내장 데이터",gas:"GAS 연동",paste:"수동"}[dataSource];

  // ── 로그인 화면 ──
  if(!loggedIn){
    return React.createElement("div",{style:{minHeight:"100vh",background:`linear-gradient(135deg,${X.bg},#141E2E,#0D1520)`,display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{width:"100%",maxWidth:420,padding:"0 20px"}},
        React.createElement("div",{style:{textAlign:"center",marginBottom:36}},
          React.createElement("div",{style:{width:72,height:72,background:`linear-gradient(135deg,${X.accent},${X.warm})`,borderRadius:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:16}},"🔐"),
          React.createElement("h1",{style:{fontSize:28,fontWeight:700}},React.createElement("span",null,"프로젝트 "),React.createElement("span",{style:{color:X.warm}},"내일로")),
          React.createElement("p",{style:{fontSize:14,color:X.dim,marginTop:4}},"오늘은 프로그램 · AI 분석 시스템"),
          React.createElement("div",{style:{fontSize:11,color:X.dim,marginTop:2}},"충북청주지역자활센터")
        ),
        React.createElement("div",{style:{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:28}},
          React.createElement("h2",{style:{fontSize:17,fontWeight:600,marginBottom:20,textAlign:"center"}},"로그인"),
          React.createElement("div",{style:{marginBottom:14}},
            React.createElement("label",{style:{fontSize:12,color:X.dim,display:"block",marginBottom:5}},"아이디"),
            React.createElement("input",{value:loginId,onChange:e=>{setLoginId(e.target.value);setLoginError("");},placeholder:"아이디",onKeyDown:e=>{if(e.key==="Enter")handleLogin();},style:{width:"100%",padding:"12px 14px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,color:X.text,fontSize:14,outline:"none"}})
          ),
          React.createElement("div",{style:{marginBottom:14}},
            React.createElement("label",{style:{fontSize:12,color:X.dim,display:"block",marginBottom:5}},"비밀번호"),
            React.createElement("input",{type:"password",value:loginPw,onChange:e=>{setLoginPw(e.target.value);setLoginError("");},placeholder:"비밀번호",onKeyDown:e=>{if(e.key==="Enter")handleLogin();},style:{width:"100%",padding:"12px 14px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:10,color:X.text,fontSize:14,outline:"none"}})
          ),
          React.createElement("div",{style:{marginBottom:16}},
            React.createElement("label",{style:{fontSize:12,color:X.dim,display:"block",marginBottom:5}},"GAS 서버 URL (선택)"),
            React.createElement("input",{value:gasInput,onChange:e=>setGasInput(e.target.value),placeholder:"https://script.google.com/macros/s/.../exec",style:{width:"100%",padding:"10px 12px",background:X.bg,border:`1px solid ${X.bdr}`,borderRadius:8,color:X.text,fontSize:12,outline:"none"}}),
            React.createElement("p",{style:{fontSize:11,color:X.dim,marginTop:4}},"미입력 시 기본 계정(admin/naeillo2026)으로 로그인")
          ),
          loginError&&React.createElement("div",{style:{color:X.err,fontSize:13,marginBottom:12,padding:"8px 12px",background:X.err+"15",borderRadius:8}},loginError),
          React.createElement("button",{onClick:handleLogin,disabled:loginLoading,style:{width:"100%",padding:14,background:`linear-gradient(135deg,${X.accent},${X.warm})`,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",opacity:loginLoading?.7:1}},loginLoading?"인증 중...":"로그인")
        )
      )
    );
  }

  // ── 이하 목록/응답/리포트 화면은 아티팩트와 동일하므로 생략(실제 index.html에는 전부 포함) ──
  // 이 파일은 구조 시연용이며, 실제 배포 시에는 아티팩트(.jsx)의 전체 코드를 이 위치에 통합합니다.

  return React.createElement("div",{style:{minHeight:"100vh",background:X.bg,padding:40,textAlign:"center"}},

  );
